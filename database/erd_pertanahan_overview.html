
<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f4f2eb',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
  },
});
const diagram = `erDiagram
  provinsi ||--o{ kabupaten : memiliki
  kabupaten ||--o{ kecamatan : memiliki
  kecamatan ||--o{ kelurahan : memiliki

  kelurahan ||--o{ persil : berlokasi
  persil ||--o{ bidang : memiliki
  bidang ||--o{ sub_persil : terdiri_dari

  kategori ||--o{ persil : mengklasifikasi
  kategori_tanah_desa ||--o{ persil : mengklasifikasi
  jenis_hak ||--o{ bidang : jenis
  jenis_uupa ||--o{ bidang : jenis
  pengelola ||--o{ bidang : mengelola
  penggunaan_rtr ||--o{ bidang : penggunaan
  status_kesesuaian ||--o{ bidang : status
  status_sertifikat ||--o{ bidang : status

  persil ||--o{ monitoring : dipantau
  persil ||--o{ pengajuan : terkait

  pengajuan ||--o{ lampiran_pengajuan : dilengkapi
  pengajuan ||--o{ verifikasi : diverifikasi
  pengajuan ||--o{ rekomendasi : menghasilkan
  pengajuan ||--o{ persetujuan_kadipaten : disetujui
  pengajuan ||--o{ sk_gubernur : diterbitkan

  pengajuan_tanah_desa ||--o{ lampiran_pengajuan_tanah_desa : dilengkapi
  pengajuan_tanah_desa ||--o{ verifikasi_tanah_desa : diverifikasi
  pengajuan_tanah_desa ||--o{ rekomendasi_tanah_desa : menghasilkan
  pengajuan_tanah_desa ||--o{ persetujuan_kadipaten_tanah_desa : disetujui
  pengajuan_tanah_desa ||--o{ sk_gubernur_tanah_desa : diterbitkan

  file ||--o{ bidang : dokumen
  file ||--o{ galeri_bidang : foto
  file ||--o{ monitoring : laporan
  users ||--o{ verifikasi : memverifikasi
  users ||--o{ persil : memverifikasi

  provinsi { smallint id PK
    varchar kode
    varchar nama
    geometry geom }
  kabupaten { smallint id PK
    smallint id_provinsi FK
    varchar kode
    varchar nama }
  kecamatan { smallint id PK
    smallint id_kabupaten FK
    varchar kode
    varchar nama }
  kelurahan { smallint id PK
    smallint id_kecamatan FK
    varchar kode
    varchar nama }
  persil { integer id PK
    smallint id_kelurahan FK
    smallint id_kategori FK
    varchar no_persil
    numeric luas
    geometry geom }
  bidang { integer id PK
    integer id_persil FK
    smallint id_jenis_hak FK
    smallint id_pengelola FK
    varchar no_bidang
    date tgl_mulai
    date tgl_selesai
    geometry geom }
  sub_persil { integer id PK
    integer id_bidang FK
    varchar no_sub_persil
    date tgl_mulai
    date tgl_selesai }
  pengajuan { integer id PK
    varchar nomor
    smallint id_kelurahan FK
    smallint id_status_pengajuan FK
    date tgl_masuk }
  pengajuan_tanah_desa { integer id PK
    varchar nomor
    smallint id_kelurahan FK
    smallint id_status_pengajuan FK
    date tgl_masuk }
  users { integer id PK
    varchar username
    varchar password_hash
    smallint id_grup FK }
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
